<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Z.ai Chat">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="application-name" content="Z.ai Chat">
  <meta name="msapplication-TileColor" content="#0a0a0a">
  <meta name="description" content="Z.ai AI Assistant - Web App">
  <meta name="color-scheme" content="dark">

  <title>Z.ai</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      background: #0a0a0a;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    /* Loading splash screen */
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      z-index: 1000;
      transition: opacity 0.4s ease, visibility 0.4s ease;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    #splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .splash-logo {
      width: 72px;
      height: 72px;
      margin-bottom: 24px;
      animation: pulse 1.8s ease-in-out infinite;
    }

    .splash-logo svg {
      width: 100%;
      height: 100%;
    }

    .splash-text {
      color: #ffffff;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    .splash-loader {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #7c5cfc;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.85; }
    }

    /* Network status banner */
    #offline-banner {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 10px 16px;
      padding-top: calc(10px + env(safe-area-inset-top));
      background: #dc2626;
      color: white;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      z-index: 999;
      display: none;
    }

    /* Fallback view (shown if redirect fails or is blocked) */
    #fallback {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      padding-top: calc(24px + env(safe-area-inset-top));
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
      background: #0a0a0a;
    }

    #fallback.visible {
      display: flex;
    }

    .fallback-logo {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
    }

    .fallback-logo svg {
      width: 100%;
      height: 100%;
    }

    .fallback-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .fallback-subtitle {
      font-size: 14px;
      color: #a1a1aa;
      margin-bottom: 28px;
      max-width: 320px;
      line-height: 1.5;
    }

    .fallback-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: #7c5cfc;
      color: #ffffff;
      border: none;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
      -webkit-appearance: none;
      appearance: none;
    }

    .fallback-btn:active {
      transform: scale(0.97);
    }

    .fallback-btn:hover {
      background: #6b4ef0;
    }

    .fallback-status {
      margin-top: 20px;
      font-size: 12px;
      color: #52525b;
    }
  </style>
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash">
    <div class="splash-logo">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="100" height="100" rx="22" fill="#7c5cfc"/>
        <path d="M30 35 L70 35 L55 55 L70 55" stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="70" cy="72" r="3.5" fill="white"/>
      </svg>
    </div>
    <div class="splash-text">Z.ai</div>
    <div class="splash-loader"></div>
  </div>

  <!-- Offline Banner -->
  <div id="offline-banner">&#9888; No internet connection</div>

  <!-- Fallback view (shown only if redirect fails) -->
  <div id="fallback">
    <div class="fallback-logo">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="100" height="100" rx="22" fill="#7c5cfc"/>
        <path d="M30 35 L70 35 L55 55 L70 55" stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="70" cy="72" r="3.5" fill="white"/>
      </svg>
    </div>
    <div class="fallback-title">Z.ai Chat</div>
    <div class="fallback-subtitle">Tap below to open the Z.ai assistant in your browser or installed app.</div>
    <a class="fallback-btn" href="https://chat.z.ai/" target="_blank" rel="noopener">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14"/><path d="M12 5l7 7-7 7"/>
      </svg>
      Open Z.ai
    </a>
    <div class="fallback-status" id="fallback-status"></div>
  </div>

  <script>
    (function () {
      'use strict';

      var TARGET_URL = 'https://chat.z.ai/';
      var splash = document.getElementById('splash');
      var offlineBanner = document.getElementById('offline-banner');
      var fallback = document.getElementById('fallback');
      var fallbackStatus = document.getElementById('fallback-status');

      // ----- Online / offline detection -----
      function updateOnlineStatus() {
        if (navigator.onLine) {
          offlineBanner.style.display = 'none';
        } else {
          offlineBanner.style.display = 'block';
        }
      }
      window.addEventListener('online', updateOnlineStatus);
      window.addEventListener('offline', updateOnlineStatus);
      updateOnlineStatus();

      // ----- Redirect to Z.ai -----
      // z.ai responds with X-Frame-Options: SAMEORIGIN, so it CANNOT be
      // embedded in an iframe. We redirect the top-level window instead.
      // When the PWA is installed (display: standalone), this still feels
      // like a native app because Chrome hides the browser chrome.
      function showFallback(message) {
        splash.classList.add('hidden');
        fallback.classList.add('visible');
        if (message) fallbackStatus.textContent = message;
      }

      function redirectToTarget() {
        // navigator.onLine is notoriously unreliable (it can be true even
        // on captive portals or when DNS fails). Do a real connectivity
        // probe before redirecting, so we can show a friendly offline
        // message instead of letting the browser show chrome-error.
        var probeUrl = TARGET_URL + '?ping=' + Date.now();
        var didRedirect = false;

        var probe = new Promise(function (resolve, reject) {
          fetch(probeUrl, { mode: 'no-cors', cache: 'no-store', method: 'HEAD' })
            .then(function () { resolve(); })
            .catch(reject);
          // Timeout: if probe doesn't respond in 3s, treat as offline
          setTimeout(function () { reject(new Error('probe timeout')); }, 3000);
        });

        probe
          .then(function () {
            didRedirect = true;
            try {
              window.location.replace(TARGET_URL);
            } catch (e) {
              didRedirect = false;
              showFallback('Could not open Z.ai automatically.');
            }
          })
          .catch(function () {
            showFallback('You appear to be offline. Connect to the internet and try again.');
          });

        // Safety: if neither path resolves in 5s, show fallback
        setTimeout(function () {
          if (!didRedirect && !fallback.classList.contains('visible')) {
            showFallback('Could not reach Z.ai. Tap below to retry.');
          }
        }, 5000);
      }

      // Register the service worker FIRST, then wait for it to be ready
      // before redirecting. If we redirect too early, the SW never gets
      // a chance to install, which breaks offline support.
      var swReadyPromise = Promise.resolve();
      if ('serviceWorker' in navigator) {
        swReadyPromise = navigator.serviceWorker.register('sw.js')
          .then(function (reg) {
            console.log('SW registered:', reg.scope);
            // navigator.serviceWorker.ready resolves once an active SW
            // controls this page. Bounded by timeout below.
            return navigator.serviceWorker.ready;
          })
          .then(function () {
            console.log('SW active');
          })
          .catch(function (err) {
            console.log('SW registration failed:', err);
          });
      }

      // Race: wait for SW to be ready, but no longer than 2s.
      // After that, redirect regardless (so users on slow devices
      // still get to Z.ai quickly).
      Promise.race([
        swReadyPromise,
        new Promise(function (resolve) { setTimeout(resolve, 2000); })
      ]).then(redirectToTarget);

      // Fallback safety net: if redirect hasn't happened after 7s (e.g.
      // the browser blocked it), show the manual open button.
      setTimeout(function () {
        if (window.location.href.indexOf('chat.z.ai') === -1 &&
            window.location.href.indexOf('z.ai') === -1) {
          showFallback('Redirect blocked by browser. Tap to open manually.');
        }
      }, 7000);

      // ----- Handle Android back button (PWA) -----
      window.addEventListener('popstate', function () {
        if (window.location.hash !== '#home') {
          // Re-show fallback if user navigates back to the shell
          splash.classList.add('hidden');
          fallback.classList.add('visible');
        }
      });
    })();
  </script>

</body>
</html>
